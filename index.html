<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="winText"></h1>

        <div class="paracontainer">
            <p id="outputText"></p>
        </div>

        <div class="scoreBoxes">
            <p id="playerScore">Player score:</p>
            <p id="computerScore">Computer score:</p>
        </div>
       
        <div class="buttons">
            <button id="rock" class="btn">Rock</button>
            <button id="paper" class="btn">Paper</button>
            <button id="scissors" class="btn">Scissors</button>
        </div>
        <div class="footer">
        <button class="reset">Reset game</button>
        <p class="computerShowChoice"></p>
        </div>
    </div>
    <script src="rock-paper-scissors.js"></script>
</body>
</html>
